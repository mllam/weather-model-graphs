# CI/CD workflow to run test suite using pytest
# Installs project dependencies using PDM
# Torch (CPU version) is installed separately due to custom wheel source
# Finally, runs the test suite to validate functionality
name: tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pdm
        run: |
          python -m pip install pdm
          pdm --version

      - name: Install torch
        run: |
          python -m pip install torch==1.8.1+cpu -f https://download.pytorch.org/whl/torch_stable.html

      - name: Install package (including dev dependencies)
        run: |
          pdm install
          pdm install --dev

      - name: Run tests
        run: |
          pdm run pytest --nbval-lax