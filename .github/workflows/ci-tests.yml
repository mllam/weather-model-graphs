# cicd workflow for running tests with pytest
# needs to first install pdm, then install torch cpu manually and then install the package
# then run the tests

name: tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pdm
        run: |
          python -m pip install pdm
          pdm --version

      - name: Install torch
        run: |
          python -m pip install torch==2.3.0+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: Install package (including dev dependencies)
        run: |
          pdm install
          pdm install --dev

      - name: Run tests
        run: |
          pdm run pytest --nbval-lax
