name: linting

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"

jobs:
  linting:
    name: "pre-commit hooks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 👇 ADD THIS BLOCK (important)
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: pre-commit/action@v3.0.1s
